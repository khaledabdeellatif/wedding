<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariem & Ghassen — Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --noir: #0b0a08;
            --or: #c9a84c;
            --or-light: #e8d5a3;
            --or-pale: #f5ede0;
            --ivoire: #faf6ee;
            --text-dark: #1a1208;
            --text-mid: #5c4a2a;
            --env-ratio: 0.62;
            /* largeur dynamique */
            --env-w: min(90vw, 520px);
            --env-h: calc(var(--env-w) * var(--env-ratio));
        }

        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: var(--noir);
            overflow: hidden;
            font-family: 'Cormorant Garamond', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Stage plein écran ── */
        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 50% 40%, #1a1610 0%, #0b0a08 80%);
            z-index: 0;
        }

        /* ── Enveloppe ── */
        .envelope-scene {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
        }

        .envelope-wrapper {
            position: relative;
            width: var(--env-w);
            height: var(--env-h);
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            animation: float-idle 5s ease-in-out infinite;
            transition: transform 0.3s ease, filter 0.4s ease;
        }
        .envelope-wrapper:focus-visible {
            filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.3));
        }

        @keyframes float-idle {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-8px) rotate(0.4deg);
            }
            75% {
                transform: translateY(-4px) rotate(-0.4deg);
            }
        }

        .envelope-wrapper.is-opening {
            animation: none;
            transform: translateY(-6vh) scale(1.02);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
        }

        /* ── Enveloppe ── */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
        }

        /* ── Corps ── */
        .env-body {
            position: absolute;
            inset: 0;
            border-radius: 4px 4px 6px 6px;
            overflow: hidden;
            box-shadow:
                0 6px 0 rgba(180, 140, 60, 0.5),
                0 12px 0 rgba(160, 120, 40, 0.25),
                0 40px 80px rgba(0, 0, 0, 0.9),
                0 80px 160px rgba(0, 0, 0, 0.6),
                inset 0 0 80px rgba(201, 168, 76, 0.04);
            background:
                repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(201, 168, 76, 0.02) 28px, rgba(201, 168, 76, 0.02) 29px),
                repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(201, 168, 76, 0.012) 28px, rgba(201, 168, 76, 0.012) 29px),
                linear-gradient(155deg, #f8f2e6 0%, #f0e6d4 40%, #e8ddc8 70%, #f3ead9 100%);
        }

        .env-border {
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 3px;
            pointer-events: none;
        }

        /* triangles de profondeur */
        .env-tri {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .env-tri.left {
            bottom: 0;
            left: 0;
            border-width: 0 0 calc(var(--env-h) * 0.48) calc(var(--env-w) * 0.5);
            border-color: transparent transparent rgba(220, 205, 180, 0.4) transparent;
        }
        .env-tri.right {
            bottom: 0;
            right: 0;
            border-width: calc(var(--env-h) * 0.48) 0 0 calc(var(--env-w) * 0.5);
            border-color: transparent transparent transparent rgba(210, 195, 168, 0.3);
        }

        /* reflet soyeux */
        .env-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg,
                    transparent 30%,
                    rgba(255, 240, 180, 0.12) 48%,
                    rgba(255, 250, 200, 0.18) 50%,
                    rgba(255, 240, 180, 0.12) 52%,
                    transparent 70%);
            background-size: 200% 100%;
            animation: shimmer-sweep 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmer-sweep {
            0% {
                background-position: -100% 0;
            }
            40%,
            100% {
                background-position: 200% 0;
            }
        }

        /* ── Lettre intérieure ── */
        .letter-paper {
            position: absolute;
            left: 6%;
            right: 6%;
            top: 5%;
            bottom: 5%;
            background: linear-gradient(165deg, #fffdf8 0%, #faf4e8 50%, #f5eedc 100%);
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 4vw, 32px);
            text-align: center;
            opacity: 0;
            transform: translateY(20px) scale(0.97);
            transition: opacity 0.9s ease 0.8s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.8s;
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.10),
                inset 0 0 40px rgba(201, 168, 76, 0.05);
            border: 0.5px solid rgba(201, 168, 76, 0.25);
            z-index: 4;
        }

        .is-opening .letter-paper {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .letter-frame {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 2px;
            pointer-events: none;
        }
        .letter-frame::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 0.5px solid rgba(201, 168, 76, 0.08);
            border-radius: 1px;
        }

        .lf-corner {
            position: absolute;
            width: 24px;
            height: 24px;
            color: rgba(201, 168, 76, 0.5);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: 'Cinzel', serif;
        }
        .lf-corner.tl {
            top: 10px;
            left: 10px;
        }
        .lf-corner.tr {
            top: 10px;
            right: 10px;
            transform: scaleX(-1);
        }
        .lf-corner.bl {
            bottom: 10px;
            left: 10px;
            transform: scaleY(-1);
        }
        .lf-corner.br {
            bottom: 10px;
            right: 10px;
            transform: scale(-1, -1);
        }

        .letter-ornament-top {
            font-family: 'Cinzel', serif;
            font-size: clamp(8px, 1.2vw, 10px);
            letter-spacing: 8px;
            color: var(--or);
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .letter-names {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 4vw, 28px);
            font-weight: 300;
            font-style: italic;
            color: var(--text-dark);
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .letter-amp {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(12px, 2vw, 16px);
            font-style: normal;
            color: var(--or);
            display: block;
            margin: 4px 0 2px;
            letter-spacing: 4px;
        }

        .letter-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--or), transparent);
            margin: 8px auto;
        }

        .letter-arabic {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: clamp(13px, 2.4vw, 17px);
            color: var(--text-mid);
            direction: rtl;
            letter-spacing: 0.5px;
        }

        /* ── Rabat ── */
        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: calc(var(--env-h) * 0.58);
            transform-origin: top center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        .is-opening .env-flap {
            transform: perspective(1400px) rotateX(-178deg);
            transition: transform 1.3s cubic-bezier(0.45, 0.05, 0.15, 1.0);
        }

        .flap-face {
            position: absolute;
            inset: 0;
            clip-path: polygon(0 0, 100% 0, 50% 82%);
            overflow: hidden;
            border-radius: 4px 4px 0 0;
        }

        .flap-paper {
            position: absolute;
            inset: 0;
            background: linear-gradient(175deg, #f5ead0 0%, #f0e2c4 40%, #e8d8b8 70%, #ecdfc8 100%);
        }

        .flap-crease {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(255, 245, 210, 0.3) 0%,
                    rgba(201, 168, 76, 0.08) 30%,
                    transparent 60%);
            clip-path: polygon(0 0, 100% 0, 50% 82%);
        }

        .flap-shadow {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.07));
            clip-path: polygon(0 0, 100% 0, 50% 82%);
        }

        .flap-back {
            position: absolute;
            inset: 0;
            clip-path: polygon(0 0, 100% 0, 50% 82%);
            background: linear-gradient(175deg, #ecdfc8 0%, #e0d0b0 100%);
            transform: rotateX(180deg);
            backface-visibility: hidden;
        }

        /* ── Sceau de cire ── */
        .seal-container {
            position: absolute;
            top: calc(var(--env-h) * 0.36);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            transform-origin: center center;
        }

        .is-opening .seal-container {
            transform: translateX(-50%) scale(0) rotate(45deg);
            opacity: 0;
            transition-delay: 0.15s;
        }

        .seal {
            position: relative;
            width: clamp(64px, 14vw, 80px);
            height: clamp(64px, 14vw, 80px);
            border-radius: 50%;
            box-shadow:
                0 4px 0 rgba(40, 10, 10, 0.8),
                0 8px 20px rgba(0, 0, 0, 0.7),
                inset 0 2px 6px rgba(255, 120, 120, 0.15),
                inset 0 -3px 6px rgba(0, 0, 0, 0.4);
        }

        .seal-wax {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background:
                radial-gradient(ellipse at 35% 30%, #a03333 0%, #7a1f1f 35%, #5c1515 65%, #3d0d0d 100%);
        }

        .seal-wax::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 22%;
            width: 14%;
            height: 10px;
            background: #5c1515;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 3px 0 rgba(40, 10, 10, 0.6);
        }
        .seal-wax::after {
            content: '';
            position: absolute;
            bottom: -3px;
            right: 24%;
            width: 10%;
            height: 6px;
            background: #6a1818;
            border-radius: 0 0 3px 3px;
        }

        .seal-edge {
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            border: 2px solid rgba(201, 168, 76, 0.5);
            box-shadow: inset 0 1px 3px rgba(255, 200, 100, 0.2);
        }

        .seal-text-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .seal-monogram {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(11px, 2.2vw, 15px);
            color: #f0d898;
            letter-spacing: 1px;
            line-height: 1.1;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .seal-amp {
            font-size: clamp(8px, 1.6vw, 11px);
            color: rgba(240, 216, 152, 0.7);
        }

        .seal-shine {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(ellipse at 30% 25%, rgba(255, 245, 200, 0.25) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── CTA pré-ouverture ── */
        .cta-block {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: clamp(24px, 4vh, 44px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .cta-block.hidden {
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }

        .cta-line {
            font-family: 'Cinzel', serif;
            font-size: clamp(10px, 1.6vw, 13px);
            letter-spacing: 5px;
            color: var(--or);
            text-transform: uppercase;
            animation: cta-breathe 3s ease-in-out infinite;
        }
        @keyframes cta-breathe {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .cta-arabic {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: clamp(13px, 2.2vw, 17px);
            color: rgba(201, 168, 76, 0.45);
            margin-top: 6px;
            direction: rtl;
            display: block;
        }

        .cta-click-hint {
            display: block;
            margin: 16px auto 0;
            width: 1px;
            height: 32px;
            background: linear-gradient(to bottom, var(--or), transparent);
            animation: hint-pulse 2.8s ease-in-out infinite;
        }
        @keyframes hint-pulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scaleY(0.6);
            }
            50% {
                opacity: 0.8;
                transform: scaleY(1);
            }
        }

        /* ── Contenu post-ouverture ── */
        .post-open {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: clamp(20px, 3vh, 36px);
            opacity: 0;
            transform: translateY(24px);
            pointer-events: none;
            transition: opacity 0.9s ease 1.4s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.4s;
            max-width: 480px;
        }
        .post-open.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .post-date {
            font-family: 'Cinzel', serif;
            font-size: clamp(10px, 1.4vw, 12px);
            letter-spacing: 6px;
            color: rgba(201, 168, 76, 0.5);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .post-names {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(26px, 5.5vw, 42px);
            font-weight: 300;
            font-style: italic;
            color: var(--or-light);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .post-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 12px auto 14px;
            max-width: 200px;
        }
        .post-divider-line {
            flex: 1;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, var(--or), transparent);
        }
        .post-divider-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--or);
            opacity: 0.5;
        }

        .post-subtitle {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: clamp(15px, 2.8vw, 20px);
            color: rgba(201, 168, 76, 0.5);
            direction: rtl;
            display: block;
            margin-bottom: 18px;
        }

        .post-btn {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: clamp(9px, 1.3vw, 11px);
            letter-spacing: 4px;
            color: var(--or);
            background: transparent;
            border: 0.5px solid rgba(201, 168, 76, 0.35);
            padding: 12px 36px;
            cursor: pointer;
            border-radius: 2px;
            text-transform: uppercase;
            transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .post-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.08), transparent);
            transition: left 0.5s ease;
        }
        .post-btn:hover::before {
            left: 100%;
        }
        .post-btn:hover {
            background: rgba(201, 168, 76, 0.06);
            border-color: rgba(201, 168, 76, 0.6);
            color: #f0d898;
            transform: translateY(-1px);
        }
        .post-btn:active {
            transform: scale(0.97);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            :root {
                --env-w: 92vw;
            }
        }

        @media (min-width: 768px) {
            :root {
                --env-w: 460px;
            }
        }

        @media (min-width: 1200px) {
            :root {
                --env-w: 500px;
            }
        }

        @media (max-height: 600px) {
            .cta-block {
                margin-top: 12px;
            }
            .post-open {
                margin-top: 10px;
            }
            .post-names {
                font-size: clamp(20px, 4vw, 28px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .envelope-wrapper {
                animation: none;
            }
            .env-shimmer {
                animation: none;
            }
            .cta-line {
                animation: none;
                opacity: 0.8;
            }
            .cta-click-hint {
                animation: none;
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>

    <main class="stage" role="main">

        <div class="envelope-scene">

            <!-- Enveloppe -->
            <div class="envelope-wrapper" id="envelopeWrapper" role="button" tabindex="0"
            aria-label="Ouvrir l'invitation de mariage de Mariem et Ghassen" aria-pressed="false">

            <div class="envelope">

                <!-- Corps -->
                <div class="env-body">
                    <div class="env-shimmer"></div>
                    <div class="env-border"></div>
                    <div class="env-tri left"></div>
                    <div class="env-tri right"></div>

                    <!-- Lettre (visible après ouverture) -->
                    <div class="letter-paper" id="letterContent" role="region" aria-label="Contenu de l'invitation" aria-hidden="true">
                        <div class="letter-frame">
                            <span class="lf-corner tl">✦</span>
                            <span class="lf-corner tr">✦</span>
                            <span class="lf-corner bl">✦</span>
                            <span class="lf-corner br">✦</span>
                        </div>
                        <div class="letter-ornament-top">✦ &nbsp; ✦ &nbsp; ✦</div>
                        <div class="letter-names">
                            Mariem
                            <span class="letter-amp">&amp;</span>
                            Ghassen
                        </div>
                        <div class="letter-divider"></div>
                        <div class="letter-arabic">نحن نتزوج</div>
                    </div>
                </div>

                <!-- Rabat -->
                <div class="env-flap" id="envFlap">
                    <div class="flap-face">
                        <div class="flap-paper"></div>
                        <div class="flap-crease"></div>
                        <div class="flap-shadow"></div>
                    </div>
                    <div class="flap-back"></div>
                </div>

                <!-- Sceau de cire -->
                <div class="seal-container" id="sealContainer" aria-hidden="true">
                    <div class="seal">
                        <div class="seal-wax"></div>
                        <div class="seal-edge"></div>
                        <div class="seal-text-container">
                            <div class="seal-monogram">M<span class="seal-amp"> &amp; </span>G</div>
                        </div>
                        <div class="seal-shine"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- CTA pré-ouverture -->
        <div class="cta-block" id="ctaBlock">
            <div class="cta-line">Ouvrir l'invitation</div>
            <span class="cta-arabic">انقر لفتح الدعوة</span>
            <span class="cta-click-hint" aria-hidden="true"></span>
        </div>

        <!-- Contenu post-ouverture -->
        <div class="post-open" id="postOpen" aria-live="polite">
            <div class="post-date">Vous êtes cordialement invités</div>
            <div class="post-names">Mariem<br>&amp;<br>Ghassen</div>
            <div class="post-divider">
                <div class="post-divider-line"></div>
                <div class="post-divider-dot"></div>
                <div class="post-divider-line"></div>
            </div>
            <span class="post-subtitle">يسعدنا دعوتكم لمشاركتنا فرحتنا</span>
            <button class="post-btn" onclick="openInvitation()" aria-label="Voir les détails complets de l'invitation">
                Voir l'invitation
            </button>
        </div>

    </div>

</main>

<script>
    (function() {
        const wrapper = document.getElementById('envelopeWrapper');
        const ctaBlock = document.getElementById('ctaBlock');
        const postOpen = document.getElementById('postOpen');
        const letterEl = document.getElementById('letterContent');
        let opened = false;

        function openEnvelope() {
            if (opened) return;
            opened = true;

            wrapper.classList.add('is-opening');
            wrapper.setAttribute('aria-pressed', 'true');
            wrapper.setAttribute('aria-label', 'Invitation ouverte');
            wrapper.style.cursor = 'default';

            ctaBlock.classList.add('hidden');
            letterEl.setAttribute('aria-hidden', 'false');

            setTimeout(() => {
                postOpen.classList.add('visible');
            }, 700);
        }

        wrapper.addEventListener('click', openEnvelope);
        wrapper.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                openEnvelope();
            }
        });

        // Parallax subtil au survol (bureau)
        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', e => {
                if (opened) return;
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const dx = (e.clientX - cx) / cx;
                const dy = (e.clientY - cy) / cy;
                wrapper.style.transform =
                    `translateY(${dy * -8}px) rotateY(${dx * 5}deg) rotateX(${dy * -4}deg)`;
            });
            document.addEventListener('mouseleave', () => {
                if (!opened) wrapper.style.transform = '';
            });
        }

        // Fonction appelée par le bouton "Voir l'invitation"
        window.openInvitation = function() {
            // Redirige vers une page dédiée ou affiche une modale.
            // Pour l'exemple, on simule l'ouverture d'un détail.
            alert(
                '💌 Détails de l\'invitation\n\n' +
                '📅 Date : 12 Juin 2026\n' +
                '📍 Lieu : Palais des Fêtes, Tunis\n' +
                '👗 Dress code : Élégant\n' +
                '🕒 Programme : 18h00 - Cérémonie\n' +
                '📩 RSVP : avant le 1er Mai'
            );
        };
    })();
</script>
